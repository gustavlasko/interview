---
name: Build and Push

on:
  workflow_call:
    inputs:
      push_image:
        description: 'Whether to push the built image to the registry'
        required: false
        default: false

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME: interview-app
  IMAGE_REF: ${{ env.IMAGE_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}

jobs:
  build:
  runs-on: ubuntu-latest
  permissions:
    contents: read
    packages: write
  steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      if: ${{ inputs.push_image }}
      uses: docker/login-action@v4
      with:
        registry: ${{ env.IMAGE_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract version from pom.xml
      id: extract_version
      run: |
        version=$(xmllint --xpath "/*[local-name()='project']/*[local-name()='version']/text()" backend/pom.xml)
        if [[ -z "$version" ]]; then
          echo "::error::Failed to extract version from backend/pom.xml"
          exit 1
        fi
        printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: .
        push: ${{ inputs.push_image }}
        tags: |
          ${{ env.IMAGE_REF }}:latest
          ${{ env.IMAGE_REF }}:${{ env.VERSION }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
