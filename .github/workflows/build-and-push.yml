---
name: Build and Push

on:
  workflow_call:
    inputs:
      push_image:
        description: 'Whether to push the built image to the registry'
        required: false
        type: boolean
        default: false

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_NAME: interview-app
  IMAGE_REF: ghcr.io/${{ github.repository_owner }}/interview-app

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from pom.xml
        id: extract_version
        run: |
          version=$(grep -oP '(?<=<version>)[^<]+(?=</version>)' backend/pom.xml | head -n 1)
          if [[ -z "$version" ]]; then
            echo "::error::Failed to extract version from backend/pom.xml"
            exit 1
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ inputs.push_image }}
          tags: |
            ${{ env.IMAGE_REF }}:latest
            ${{ env.IMAGE_REF }}:${{ steps.extract_version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
