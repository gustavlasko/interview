---
name: Validate Helm Chart (reusable)

on:
  workflow_call:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Lint Helm chart
        run: helm lint ./sre/interview-app

      - name: Lint YAML files
        run: yamllint -c .yamllint.yaml ./sre/interview-app

      - name: Scan with kube-linter
        uses: stackrox/kube-linter-action@v1.0.7
        with:
          directory: sre/interview-app
