---
name: Publish Helm Chart

on:
  push:
    branches:
      - master
    paths:
      - 'sre/interview-app/**'
  workflow_dispatch:

jobs:
  validate:
    permissions:
      contents: read
    uses: ./.github/workflows/validate-helm-reusable.yml

  publish:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm chart
        run: helm package sre/interview-app

      - name: Push Helm chart to GHCR
        run: |
          helm push interview-app-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
