apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "interview-app.fullname" . }}-test-connection"
  labels:
    {{- include "interview-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
  containers:
    - name: wget
      image: busybox:1.37.1
      command: ['wget']
      args: ['{{ include "interview-app.fullname" . }}:{{ .Values.service.port }}']
      securityContext:
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
      resources:
        limits:
          cpu: 100m
          memory: 64Mi
        requests:
          cpu: 50m
          memory: 32Mi
  restartPolicy: Never
